<!-- Modals for removing permissions -->
{% for rp in roles_permissions %}
{% if rp.name != 'Todos los Permisos' %}
{% for perm in rp.permissions %}
<div class="modal fade" id="removePermissionModal-{{ rp.id }}-{{ loop.index }}" tabindex="-1"
    aria-labelledby="removePermissionModalLabel-{{ rp.id }}-{{ loop.index }}" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="removePermissionModalLabel-{{ rp.id }}-{{ loop.index }}">Confirmar
                    eliminación
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                ¿Estás seguro de que deseas remover el permiso <strong>{{ perm }}</strong> del rol
                <strong>{{
                    rp.name }}</strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                    data-bs-dismiss="modal">Cancelar</button>
                <form action="{{ url_for('role.remove_permission', role_id=rp.id) }}" method="post"
                    style="display: inline;">
                    <input type="hidden" name="permission_name" value="{{ perm }}">
                    <button type="submit" class="btn btn-danger">Remover</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endfor %}
{% endif %}
{% endfor %}
