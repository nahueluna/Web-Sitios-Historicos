{% extends "layout.html" %}

{% block title %}Detalle Sitio Histórico{% endblock %}

{% block content %}

<div id="historic-site-detail" data-site-id="{{ site_id }}"></div>

<div>
    <a href="" style="padding: 10px 15px;">
        <button>
            Exportar Sitio a CSV</button>
    </a>

</div>

{% endblock %}
{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const container = document.getElementById("historic-site-detail");
        const siteId = container.getAttribute('data-site-id');
        console.log("id", siteId);

        if (!siteId) {
            container.innerHTML = "<p>Error: No se proporcionó ID del sitio</p>";
            return;
        }

        fetch(`/sitios-historicos/get-site/${siteId}`)
            .then(response => response.json())
            .then(hs => {
                const container = document.getElementById("historic-site-detail");

                if (hs.error) {
                    container.innerHTML = `<p>${hs.error}</p>`;
                    return;
                }
                console.log("hs", hs)
                container.innerHTML = `
                <div style="border:1px solid #ccc; padding:16px;">
                    <h3>${hs.site_name}</h3>
                    <p><strong>Descripción corta:</strong> ${hs.short_description}</p>
                    <p><strong>Descripción larga:</strong> ${hs.long_description}</p>
                    <p><strong>Ciudad:</strong> ${hs.city}, <strong>Provincia:</strong> ${hs.province}</p>
                    <p><strong>Estado de conservación:</strong> ${hs.status}</p>
                    <p><strong>Año de inauguración:</strong> ${hs.inauguration_year}</p>
                </div>
            `;
            })
            .catch(err => {
                console.error("Error al cargar detalle:", err);
                document.getElementById("historic-site-detail").innerHTML =
                    "<p>Error al cargar el detalle.</p>";
            });
    });
</script>
{% endblock %}
