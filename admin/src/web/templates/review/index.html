{% extends "layout.html" %}

{% block title %}Reseñas{% endblock %}

{% block head %}
{{ super() }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
{% endblock %}

{% block content %}
<div class="container-fluid d-flex flex-column py-4">
    <div class="row mb-3">
        <div class="col-12">
            <h2 class="display-6 fw-bold text-primary">Listado de Reseñas</h2>
        </div>
    </div>

    <!-- Search bar and filters -->
    <form id="filters-form" class="row g-2 mb-4 align-items-center">

        <div class="row g-2 align-items-center mb-2 flex-wrap">
            <div class="col-12 col-md-auto">
                <label for="user-search" class="visually-hidden"></label>
                <input type="search" class="form-control" id="user-search" name="user_email"
                    placeholder="Buscar por email de usuario..." value="{{ request.args.get('user_email', '') }}" autofocus style="min-width:260px;">
            </div>

            <div class="col-12 col-md-auto" style="min-width: 220px;">
                <label for="site" class="visually-hidden">Sitio histórico</label>
                <select class="form-select" id="site" name="site">
                    <option value="">Sitio histórico</option>
                </select>
            </div>

            <div class="col-12 col-md-auto" style="min-width: 220px; max-width: 300px;">
                <label for="rating" class="visually-hidden">Calificación</label>
                <select class="form-select" id="rating" name="rating">
                    <option value="">Calificación</option>
                    {% for r in range(1,6) %}
                        <option value="{{ r }}" {% if request.args.get('rating') == r|string %}selected{% endif
                                %}> ⭐ {{ r }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-auto">
                <button type="submit" class="btn btn-success">Buscar</button>
            </div>
        </div>

        <div class="row g-2 align-items-end mb-2 flex-wrap">

            <div class="col-12 col-md-auto">
                <label for="date_from" class="mb-0">Desde</label>
                <input type="date" class="form-control" id="date_from" name="date_from"
                    value="{{ request.args.get('date_from', '') }}">
            </div>
            <div class="col-12 col-md-auto">
                <label for="date_to" class="mb-0">Hasta</label>
                <input type="date" class="form-control" id="date_to" name="date_to"
                    value="{{ request.args.get('date_to', '') }}">
            </div>

            <div class="col-12 col-md-auto">
                <label for="order_by" class="mb-0">Ordenar por:</label>
                <select name="order_by" class="form-select" id="order_by">
                    <option value="inserted_at" {% if request.args.get('order_by')=='inserted_at' %}selected{% endif %}>
                        Fecha de creación</option>
                    <option value="rating" {% if request.args.get('order_by')=='rating' %}selected{% endif %}>Calificación
                    </option>
                </select>
            </div>
            <div class="col-12 col-md-auto">
                <label for="order_dir" class="visually-hidden">Dirección</label>
                <select name="order_dir" class="form-select" id="order_dir">
                    <option value="asc" {% if request.args.get('order_dir', 'asc' )=='asc' %}selected{% endif %}>
                        Ascendente</option>
                    <option value="desc" {% if request.args.get('order_dir', 'asc' )=='desc' %}selected{% endif %}>
                        Descendente</option>
                </select>
            </div>

            <div class="col-12 col-md-auto">
                <label for="status" class="visually-hidden">Estado de la reseña</label>
                <select class="form-select" id="status" name="status">
                    <option value="">Estado de la reseña</option>
                    <option value="PENDING" {% if request.args.get('status') == ReviewStatus.PENDING.name %}selected{% endif %}>Pendiente</option>
                    <option value="APPROVED" {% if request.args.get('status') == ReviewStatus.APPROVED.name %}selected{% endif %}>Aprobada</option>
                    <option value="REJECTED" {% if request.args.get('status') == ReviewStatus.REJECTED.name %}selected{% endif %}>Rechazada</option>
                </select>
            </div>

            <div class="col-12 col-md-auto">
                <button type="button" id="clear-filters" class="btn btn-secondary">Limpiar filtros</button>
            </div>
        </div>
    </form>

    <div id="result-count" class="d-flex justify-content-between align-items-center mb-2">
        <p id="result-number" class="lead mb-0"></p>
    </div>

    <div class="row mt-3">
        <div class="col-12" style="max-width: 90vw; margin: 0 auto;">
            <div id="reviews-list" class="row g-3 align-content-start"></div>
        </div>
    </div>

</div>

<div id="flash-container" class="position-fixed bottom-0 start-0 p-3" style="z-index: 1080;"></div>


<nav aria-label="Paginación reviews" class="mt-3" id="pagination-nav">
    <ul class="pagination"></ul>
</nav>

<!-- div para window.alert -->
<div id="flash-container" class="position-fixed bottom-0 start-0 p-3" style="z-index: 1080;"></div>

<!-- Reject Review Modal -->
<div class="modal fade" id="reject-modal" tabindex="-1" aria-labelledby="rejectModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Rechazar reseña</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-footer">
        <form method="POST" id="reject-form" class="w-100">
          <input type="hidden" name="_method" value="PUT">
          <label id="rejection-reason-label" for="rejection-reason" class="form-label">Indique el motivo del rechazo</label>
          <textarea id="rejection-reason" name="rejection_reason" class="form-control" required minlength="1" maxlength="200" rows="4" aria-describedby="rejection-reason-help" autofocus></textarea>
          <div id="rejection-reason-help" class="form-text">Máx. 200 caracteres.</div>
          <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-danger" id="modal-btn-reject">Rechazar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
    /* Estilos para Choice.js */
    .choices__list--multiple,
    .choices__inner {
        max-height: 38px;
        min-height: 38px;
        overflow-y: auto;
        border-radius: 0.375rem;
        background: #ffffff;
    }

    .choices__list--single {
        max-height: 38px;
        overflow-y: auto;
        border-radius: 0.375rem;
    }
</style>

{% endblock %}

{% block scripts %}

<!-- jQuery (required for Bootstrap Select) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap Select JS -->
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script>
    renderReviews = (data) => {
        const container = document.getElementById("reviews-list");
        container.innerHTML = "";

        if (data.total === 0) {
            document.getElementById("result-number").innerText = '';

            container.innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-warning text-center">
                                No se encontraron resultados
                            </div>
                        </div>`;
            return;
        }

        if (data.total === 1) {
            document.getElementById("result-number").innerText = `Se encontró 1 resultado.`;
        }
        else {
            document.getElementById("result-number").innerText = `Se encontraron ${data.total} resultados.`;
        }

        data.reviews.forEach(r => {
            const block = document.createElement("div");
            const statusStyle = new Map([ ['PENDING', "warning"], ['APPROVED', "success"], ['REJECTED', "danger"] ]);
            block.className = "col-md-6 col-lg-4";
            block.innerHTML = `
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${r.historic_site.name} - <span class="text-warning" aria-hidden="true">★</span> ${r.rating}</h5>
                                <p class="card-text"><strong>Fecha de creación:</strong> ${r.inserted_at}</p>
                                <p class="card-text"><strong>Usuario: </strong> ${r.user.email}</p>
                                <p class="card-text"><strong>Contenido:</strong> ${r.content}</p>
                                <p class="card-text badge bg-${statusStyle.get(r.status.name)} rounded-pill fs-6" >${r.status.value}</p>
                            </div>
                            <div class="card-footer text-end">
                                <div id="card-footer-buttons" class="d-flex justify-content-end gap-2">
                                    <a href="/admin/reviews/detail/${r.id}" class="btn btn-secondary">
                                        Ver Detalle
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
            if(r.status.name === "PENDING") {
                const card = block.querySelector('.card');
                if (card) {
                    const footerButtons = card.querySelector('#card-footer-buttons');
                    if (footerButtons) {
                        footerButtons.insertAdjacentHTML('afterbegin', `
                        <div class="d-flex gap-2 me-auto align-items-center">
                            <form method="POST" action="/admin/reviews/approve/${r.id}" autocomplete="off" class="m-0 me-2">
                                <input type="hidden" name="_method" value="PUT">
                                <button class="btn btn-primary" type="submit">Aprobar</button>
                            </form>
                            <button class="btn btn-danger" id="reject-btn" data-bs-toggle="modal" data-bs-target="#reject-modal" data-review-id="${r.id}">Rechazar</button>
                        </div>
                        `);
                    }
                }
            }
            container.appendChild(block);
        });
    }

    // Se encarga de mostrar la paginación y agregar listeners a los links de páginas para responder un cambio de página
    function renderPagination(page, per_page, total) {
        const pagination = document.querySelector('.pagination');
        pagination.innerHTML = '';

        if (page > 1) {
            pagination.innerHTML += `<li class="page-item">
                <a class="page-link" href="#" data-page="${page - 1}">Anterior</a>
            </li>`;
        }
        pagination.innerHTML += `<li class="page-item disabled"><span class="page-link">Página ${page}</span></li>`;
        if (total > page * per_page) {
            pagination.innerHTML += `<li class="page-item">
                <a class="page-link" href="#" data-page="${page + 1}">Siguiente</a>
            </li>`;
        }

        // Agregar listener para los links de páginas
        pagination.querySelectorAll('a[data-page]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                fetchReviews(parseInt(this.dataset.page));
            });
        });
    }

    // Fetch que obtiene las reseñas según filtros, ordenammientos y página
    function fetchReviews(page = 1) {
        // Toma los filtros y ordenamientos aplicados en el form y forma los query parameters de vuelta
        const form = document.getElementById('filters-form');
        const formData = new FormData(form);
        const params = new URLSearchParams();
        for (const [key, value] of formData.entries()) {
            if (value !== "") {
                params.append(key, value);
        }
    }

        params.append('page', page.toString());

        window.params = params;

        fetch(`/admin/reviews/search?${params.toString()}`)
            .then(response => {
                if (!response.ok) {
                    // Convierte la respuesta a JSON para obtener el mensaje de error
                    return response.json().then(errData => {
                        throw { status: response.status, message: errData.error };
                    }).catch((e) => {
                        // Captura el error en caso de que la respuesta no pueda ser convertida a JSON
                        throw { status: response.status, message: e.message || 'Error ' + response.status };
                    });
                }
                return response.json();
            })
            .then(data => {
                // Muestra los sitios históricos
                renderReviews(data);

                // Muestra la paginación y agrega listener para hacer fetch de sitios ante cambios de página
                renderPagination(data.page || 1, data.per_page || 25, data.total || 0);
                window.history.replaceState({}, '', `/admin/reviews/explore?${params.toString()}`);

                setTimeout(() => {
                    window.scrollTo(0, 0);
                }, 50);
            })
            .catch(error => {
                console.log('Error fetching reviews:', error);
                let msg = 'Ocurrió un error al cargar las reseñas.';

                if (error.status === 400 && error.message) {
                    error.message.includes("date") ?
                        msg = 'La fecha de fin no puede ser anterior a la fecha de inicio.' :
                        msg = 'El formato de los filtros enviados es inválido';
                }

                // Elimina conteo de resultados ante error
                document.getElementById("result-number").innerText = "";

                // Muestra mensaje de error
                document.getElementById("reviews-list").innerHTML = `
            <div class="col-12">
              <div class="alert alert-danger text-center">
                ${msg}
              </div>
            </div>`;
            });
    }

    // Carga el action para rechazar en el form de modal cuando se despliega el mismo (al presionar el botón)
    const rejectModal = document.getElementById('reject-modal');
    const rejectForm = document.getElementById('reject-form');

    rejectModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const reviewId = button.getAttribute('data-review-id');
        if (reviewId) {
            rejectForm.action = `/admin/reviews/reject/${reviewId}`;
        }
    })

    // Visualización de reseñas según filtros al apretar Buscar
    document.getElementById("filters-form").addEventListener('submit', function (event) {
        event.preventDefault();
        fetchReviews(1);
    })

    // Visualización inicial de todas las reseñas al cargar la página
    document.addEventListener("DOMContentLoaded", function () {
        let page = {{ request.args.get('page', 1)
    }};
    fetchReviews(page);
    })

    document.getElementById("clear-filters").addEventListener('click', function () {
        const form = document.getElementById('filters-form');
        form.reset();

        // Reestablecer manualmente los valores de los inputs y selects
        form.querySelectorAll('input[type="search"], input[type="text"], input[type="date"]').forEach(input => {
            input.value = '';
        });
        form.querySelectorAll('select').forEach(select => {
            select.selectedIndex = 0;
        });
        form.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.checked = false;
        });

        // Destruir y reinicializar Choices.js para los selects
        const sitesElement = document.getElementById('site');
        if (sitesElement.choices) {
            sitesElement.choices.destroy();
        }
        new Choices(sitesElement, {
            searchEnabled: true,
            shouldSort: false,
            itemSelectText: '',
            noResultsText: 'No se encontraron resultados',
            placeholderValue: 'Sitio histórico'
        });

        fetchReviews(1);
    });

    // Configura Choices.js para el select de sitios históricos
    document.addEventListener('DOMContentLoaded', function () {
        // Resetear las elecciones en Choices.js
        const sitesChoices = document.querySelector('#site').choices;
        if (sitesChoices) sitesChoices.clearStore();

        siteSelect = new Choices('#site', {
            searchEnabled: true,
            shouldSort: false,
            itemSelectText: '',
            noResultsText: 'No se encontraron resultados',
            placeholderValue: 'Sitio histórico'
        });

        // Llenar select de sitio histórico desde controlador
        fetch("/sitios-historicos/get-all")
                .then(res => res.json())
                .then(data => {
                    const choices = data.map(site => ({ value: site.id, label: site.site_name }));
                    const defaultChoice = { value: '', label: 'Sitio histórico', disabled: true, selected: true };
                    const choicesWithDefault = [defaultChoice, ...choices];
                    siteSelect.setChoices(choicesWithDefault, 'value', 'label', true);
                })
                .catch(error => console.error('Error loading historic sites:', error));
    });
</script>
{% endblock %}
