{% extends "layout.html" %}

{% block title %}Detalle Sitio Histórico{% endblock %}
{% block head %}
{{ super() }}
<style>
    body {
        background-color: #f8f9fa;
        min-height: 100vh;
    }

    .main-container {
        display: flex;
        gap: 20px;
        height: 90vh;
        padding: 20px;
    }

    #historic-site-detail {
        width: 400px;
        flex-shrink: 0;
        padding: 15px;
        border-radius: 8px;
        background-color: #f9f9f9;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    #log-container {
        flex: 1;
        padding: 15px;
        border-radius: 8px;
        background-color: #f9f9f9;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        
        
    }

    #logs-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-height: 70vh;
        
        overflow-y: auto;
        padding-right: 10px;
    }

    .historic-site-block {
        border: 1px solid #ccc;
        padding: 16px;
        max-block-size: 150px;
    }

    /* Responsive */
    @media (max-width: 992px) {
        .main-container {
            flex-direction: column;
            height: auto;
        }

        #historic-site-detail {
            width: 100%;
        }

        #logs-list {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 576px) {
        #logs-list {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}
{% block content %}

<div class="main-container">
    <div id="historic-site-detail">
        <!-- Contenido cargado por JavaScript -->
    </div>

    <div id="log-container">
        <h3>Historial de Cambios</h3>
        <div id="logs-list">
            <!-- Logs cargados por JavaScript -->
        </div>
        <br><br>
        <div class="pagination">
            <button id="prev-btn" class="btn btn-sm btn-outline-primary" disabled>Anterior</button>
            <span class="page-info mx-2" id="page-info">Página 1 de 1</span>
            <button id="next-btn" class="btn btn-sm btn-outline-primary" disabled>Siguiente</button>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    let currentPage = 1;
    const logsPerPage = 25;
    let allLogs = [];

    // Function to display logs for the current page
    function displayLogsPage() {
        const container = document.getElementById("logs-list");
        container.innerHTML = '';

        // Calculate which logs to show
        const startIndex = (currentPage - 1) * logsPerPage;
        const endIndex = startIndex + logsPerPage;
        const logsToShow = allLogs.slice(startIndex, endIndex);

        // If no logs to display
        if (logsToShow.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">No hay registros para mostrar</p>';
            return;
        }

        // Create elements for each log
        logsToShow.forEach(log => {
            const col = document.createElement("div");
            col.className = "col-md-4";

            const block = document.createElement("div");
            block.className = "card log-block";

            block.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${log.log_date}</h5>
                        <p class="card-text"><strong>Acción:</strong> ${log.action_type}</p>
                        <p class="card-text"><strong>Usuario:</strong> SIN IMPLEMENTAR</p>
                    </div>
                `;

            col.appendChild(block);
            container.appendChild(col);
        });

        // Update pagination info
        const totalPages = Math.ceil(allLogs.length / logsPerPage);
        document.getElementById('page-info').textContent =
            `Página ${currentPage} de ${totalPages}`;

        // Enable/disable buttons
        document.getElementById('prev-btn').disabled = currentPage <= 1;
        document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }

    // Function to go to previous page
    function goToPrevPage() {
        if (currentPage > 1) {
            currentPage--;
            displayLogsPage();
        }
    }

    // Function to go to next page
    function goToNextPage() {
        const totalPages = Math.ceil(allLogs.length / logsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            displayLogsPage();
        }
    }

    // When DOM is loaded
    document.addEventListener("DOMContentLoaded", function () {
        const pathParts = window.location.pathname.split('/');
        const siteId = pathParts[pathParts.length - 1];

        document.getElementById('prev-btn').addEventListener('click', goToPrevPage);
        document.getElementById('next-btn').addEventListener('click', goToNextPage);

        if (!siteId) {
            document.getElementById("historic-site-detail").innerHTML =
                "<p class='text-danger'>Error: No se proporcionó ID del sitio</p>";
            return;
        }

        // Fetch site details
        fetch(`/sitios-historicos/get-site/${siteId}`, { method: 'GET' })
            .then(response => response.json())
            .then(json => {
                const container = document.getElementById("historic-site-detail");

                if (json.error) {
                    container.innerHTML = `<p class="text-danger">${json.error}</p>`;
                    return;
                }
                container.innerHTML = `
                        <div class="mb-4">
                            <h3 class="text-primary">${json.historic_site.site_name}</h3>
                            <hr>
                            <p><strong>Descripción corta:</strong> ${json.historic_site.short_description}</p>
                            <p><strong>Descripción larga:</strong> ${json.historic_site.long_description}</p>
                            <p><strong>Ciudad:</strong> ${json.historic_site.city}, <strong>Provincia:</strong> ${json.historic_site.province}</p>
                            <p><strong>Coordenadas:</strong> ${json.historic_site.latitude}, ${json.historic_site.longitude}</p>
                            <p><strong>Categoría:</strong> ${json.category}</p>
                            <p><strong>Estado:</strong> ${json.state}</p>
                            <p><strong>Año de inauguración:</strong> ${json.historic_site.inauguration_year}</p>
                            <p><strong>Visible:</strong> ${json.historic_site.visible ? 'Sí' : 'No'}</p>
                        </div>
                        <div id="site-tags-container" class="mb-4">
                            <!-- Etiquetas del sitio se cargarán aquí -->
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                            <a id="edit-site-link" href="/sitios-historicos/admin/editar-sitio/${siteId}" class="btn btn-primary">
                                Editar Sitio
                            </a>
                        </div>
                    `;
            })
            .catch(err => {
                console.error("Error al cargar detalle:", err);
                document.getElementById("historic-site-detail").innerHTML =
                    "<p class='text-danger'>Error al cargar el detalle.</p>";
            });

        // Fetch logs
        fetch(`/sitios-historicos/logs/get-all/${siteId}`, { method: "GET" })
            .then(response => response.json())
            .then(json => {
                if (json.error) {
                    document.getElementById("logs-list").innerHTML =
                        `<p class="text-danger">${json.error}</p>`;
                    return;
                }

                allLogs = json;
                displayLogsPage();
            })
            .catch(err => {
                console.error("Error al cargar logs:", err);
                document.getElementById("logs-list").innerHTML =
                    "<p class='text-danger'>Error al cargar los registros.</p>";
            });
        // Fetch site tags from the new endpoint
        fetch(`/sitios-historicos/tags/site-tags/${siteId}`, { method: 'GET' })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(tagsData => {
                console.log("Etiquetas recibidas:", tagsData);

                // Find the description section where we'll insert the tags
                const siteDetailContainer = document.getElementById("historic-site-detail");
                const descriptionSection = siteDetailContainer.querySelector('.mb-4');

                // Create tags display element
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'mb-4';

                if (tagsData.length > 0) {
                    tagsDiv.innerHTML = `
                        <h5>Etiquetas del Sitio:</h5>
                        <div id="site-tags-container">
                            ${tagsData.map(tag =>
                                            `<span class="badge bg-info me-1 mb-1">${tag.name || tag}</span>`
                                        ).join('')}
                        </div>
                        `;
                } else {
                    tagsDiv.innerHTML = `
                        <h5>Etiquetas del Sitio:</h5>
                        <div id="site-tags-container">
                            <span class="text-muted">No hay etiquetas asignadas</span>
                        </div>
                        `;
                }

                // Insert tags after the description section descriptionSection.after(tagsDiv);

                // Now you can select the newly created element
                const siteTagsContainer = document.getElementById("site-tags-container");
                siteTagsContainer.appendChild(tagsDiv);
                console.log("Elemento creado:", siteTagsContainer);

            })
            .catch(err => {
                console.error("Error al cargar etiquetas:", err);
                // Optional: display error message to user
                const siteDetailContainer = document.getElementById("historic-site-detail");
                const errorDiv = document.createElement('div');
                errorDiv.className = 'alert alert-warning mt-3';
                errorDiv.textContent = 'No se pudieron cargar las etiquetas';
                siteDetailContainer.appendChild(errorDiv);
            });
    });
</script>
{% endblock %}
