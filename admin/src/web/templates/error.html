{% extends "layout.html" %}

{% block title %}Error {{ error.code }} | Mi aplicación {% endblock %}

{% block content %}
<div class="error-container">
    <h1>Error {{ error_code }}</h1>
    <h2>{{ error.message }}</h2>
    <p>{{ error.description }}</p>
    <a href="{{ url_for('home') }}" class="error-btn">Volver a la página principal</a>
</div>
{% endblock %}

{% block head %}
{{ super() }}
{% endblock %}
