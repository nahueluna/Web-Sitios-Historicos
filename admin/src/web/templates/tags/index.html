{% extends "layout.html" %}

{% block title %}Etiquetas{% endblock %}

{% block content %}
    <h2>Lista de etiquetas</h2>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <form method="get" action="{{ url_for('tags.view_tags') }}" style="display: flex; align-items: center; gap: 1rem; margin: 0;">
            <label for="tag-search" style="display: none;"></label>
            <input type="search" id="tag-search" name="q" placeholder="Buscar etiqueta..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Buscar</button>

            <label for="order_by" style="margin-left: 1rem;">Ordenar por:</label>
            <select name="order_by" id="order_by" onchange="this.form.submit()">
                <option value="name" {% if request.args.get('order_by', 'inserted_at') == 'name' %}selected{% endif %}>Nombre</option>
                <option value="inserted_at" {% if request.args.get('order_by', 'inserted_at') == 'inserted_at' %}selected{% endif %}>Fecha de creación</option>
            </select>
            <label for="order_dir" style="display: none;"></label>
            <select name="order_dir" id="order_dir" onchange="this.form.submit()">
                <option value="asc" {% if request.args.get('order_dir', 'asc') == 'asc' %}selected{% endif %}>Ascendente</option>
                <option value="desc" {% if request.args.get('order_dir', 'asc') == 'desc' %}selected{% endif %}>Descendente</option>
            </select>
        </form>
    </div>

    <div style="display: flex; gap: 2rem;">
        <div>
            <table id="tags-table">
                {% if tags %}
                <tr>
                    <th ><b>Nombre</b></th>
                </tr>
                    {% for t in tags %}
                    <tr data-id="{{ t.id }}">
                        <td>
                            <a href="{{ url_for('tags.view_specific_tag', tag_id=t.id) }}">{{ t.name }}</a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="1" class="no-results">Sin resultados</td>
                    </tr>
                {% endif %}
            </table>
        </div>
    </div>
    <a href="{{ url_for('tags.add_tag') }}" class="add-btn">Agregar etiqueta</a>
{% endblock %}

{% block footer %}
{{ super() }}
{% endblock %}
