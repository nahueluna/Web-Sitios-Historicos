{% extends "layout.html" %}

{% block title %}Sitios Históricos{% endblock %}

{% block content %}
<div class="container-fluid vh-100 d-flex flex-column py-4">
    <div class="row mb-3">
        <div class="col-12">
            <h2 class="text-center mb-0">Listado de Sitios Históricos</h2>
        </div>
    </div>
    <div class="row flex-grow-1">
        <div class="col-12 h-100">
            <div id="historic-sites-list" class="row g-3 h-100 align-content-start" style="overflow-y: auto;"></div>
        </div>
    </div>
</div>
<div id="flash-container" class="position-fixed bottom-0 start-0 p-3" style="z-index: 1080;"></div>
{% endblock %}

{% block scripts %}
<script>
    window.alert = function (message, type = "info") {
        const container = document.getElementById("flash-container");
        const alerta = document.createElement("div");

        alerta.className = `alert alert-${type} alert-dismissible fade show`;
        alerta.role = "alert";
        alerta.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;

        container.appendChild(alerta);

        // Se cierra solo después de 3 segundos
        setTimeout(() => {
            alerta.remove();
        }, 3000);
    };
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        fetch("/sitios-historicos/get-all")
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById("historic-sites-list");

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-warning text-center">
                                No hay sitios históricos registrados.
                            </div>
                        </div>`;
                    return;
                }

                {% if is_admin() %}
                const exportButton = document.createElement("button");
                exportButton.textContent = "Exportar CSV";
                exportButton.style.margin = "10px 0";
                exportButton.className = "btn btn-success";
                exportButton.onclick = async () => {
                    try {
                        exportButton.disabled = true;
                        exportButton.textContent = "Exportando...";

                        const response = await fetch("/sitios-historicos/admin/export-sites");

                        if (!response.ok) {
                            if (response.status === 403) {
                                throw new Error("No tienes permisos para exportar datos");
                            } else if (response.status === 401) {
                                throw new Error("Debes iniciar sesión para exportar datos");
                            } else {
                                throw new Error(`Error del servidor: ${response.status}`);
                            }
                        }

                        window.location.href = "/sitios-historicos/admin/export-sites";
                        window.alert("CSV exportado exitosamente", "success");
                    } catch (error) {
                        console.error("Error al exportar CSV:", error);
                        window.alert(error.message, "danger");
                    } finally {
                        exportButton.disabled = false;
                        exportButton.textContent = "Exportar CSV";
                    }
                };
                container.appendChild(exportButton);
                {% endif %}

                data.forEach(hs => {
                    const block = document.createElement("div");
                    block.className = "col-md-6 col-lg-4"; // responsive grid

                    block.innerHTML = `
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${hs.site_name}</h5>
                                <p class="card-text"><strong>Descripción corta:</strong> ${hs.short_description}</p>
                                <p class="card-text"><strong>Ciudad:</strong> ${hs.city}, <strong>Provincia:</strong> ${hs.province}</p>
                                <p class="card-text"><strong>Estado de conservación:</strong> ${hs.status_id}</p>
                                <p class="card-text"><strong>Año de inauguración:</strong> ${hs.inauguration_year}</p>
                            </div>
                            <div class="card-footer text-end">
                                <a href="/sitios-historicos/detalle/${hs.id}" class="btn btn-sm btn-primary">
                                    Ver Detalle
                                </a>
                            </div>
                        </div>
                    `;
                    container.appendChild(block);
                });
            })
            .catch(err => {
                console.error("Error al cargar los sitios históricos:", err);
                document.getElementById("historic-sites-list").innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger text-center">
                            Error al cargar los datos.
                        </div>
                    </div>`;
            });
    })
</script>
{% endblock %}
