<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mantenimiento - Sistema de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex align-items-center justify-content-center min-vh-100 p-4">
        <div class="card mx-auto" style="max-width: 28rem;">
            <div class="card-body text-center">
                <div class="mb-4">
                    <svg class="mx-auto text-warning" style="width: 5rem; height: 5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <h1 class="card-title mb-4">Sitio en Mantenimiento</h1>
                <div class="alert alert-warning mb-4">
                    <p class="mb-0">
                        {{ maintenance_message }}
                    </p>
                </div>
                <p class="text-muted mb-4">
                    Estamos trabajando para mejorar tu experiencia. Por favor, intenta nuevamente más tarde.
                </p>
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Volver al Login</a>
            </div>
        </div>
    </div>
</body>
</html>
