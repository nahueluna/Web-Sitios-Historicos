services:
  - type: web
    name: sitios-historicos-api
    runtime: python
    region: ohio
    plan: free
    rootDir: admin
    buildCommand: pip install poetry==$POETRY_VERSION && poetry install
    startCommand: poetry run gunicorn "src.web:create_app('production')" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: POETRY_VERSION
        value: "2.1.1"
      - key: BACKEND_SECRET_KEY
        generateValue: true
      - key: BACKEND_JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sitios-historicos-db
          property: connectionString
      - key: MINIO_SERVER
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MINIO_BUCKET_NAME
        sync: false
      - key: MINIO_PUBLIC_URL
        sync: false

databases:
  - name: sitios-historicos-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
    ipAllowList: []
