{% extends "layout.html" %}

{% block title %}Editar etiqueta{% endblock %}

{% block content %}
<h2 class="display-6 fw-bold text-primary">Editar etiqueta</h2>

    <strong class="h4 fw-semibold text-secondary lead">Nombre actual: {{ tag_name }}</strong>

    <div class="col-auto">
        <form method="POST" action="{{ url_for('tags.update_tag', tag_id=tag_id) }}" autocomplete="off" class="row g-2 mb-4 align-items-center">
            <input type="hidden" name="_method" value="PUT">
            <fieldset>
                <div class="mb-4 mt-2">
                    <label id="new-name" for="name">Nuevo nombre:</label>
                    <input type="text" id="name" name="name" class="form-control" required minlength="3" maxlength="50" pattern=".{3,50}" autofocus aria-describedby="new-name" style="max-width: 38vh;">
                    <input type="hidden" name="original_name" value="{{ tag_name }}">
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Actualizar</button>
                    <a href="{{ url_for('tags.view_tags') }}" class="btn btn-secondary">Volver a la lista de etiquetas</a>
                </div>
            </fieldset>
        </form>
    </div>
{% endblock %}
